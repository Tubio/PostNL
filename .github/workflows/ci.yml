name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: |
          npx tsc --noEmit -p lambdas/capacity-sync/tsconfig.json
          npx tsc --noEmit -p lambdas/location-tracker/tsconfig.json
          npx tsc --noEmit -p lambdas/stock-tracker/tsconfig.json
          npx tsc --noEmit -p lambdas/stock-level-resolver/tsconfig.json

      - name: Test
        run: npm test --workspaces --if-present