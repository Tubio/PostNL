name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            lambdas/capacity-sync/package-lock.json
            lambdas/location-tracker/package-lock.json
            lambdas/stock-tracker/package-lock.json
            lambdas/stock-level-resolver/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix lambdas/capacity-sync
          npm ci --prefix lambdas/location-tracker
          npm ci --prefix lambdas/stock-tracker
          npm ci --prefix lambdas/stock-level-resolver

      - name: Type check
        run: |
          npm run --prefix lambdas/capacity-sync tsc -- --noEmit
          npm run --prefix lambdas/location-tracker tsc -- --noEmit
          npm run --prefix lambdas/stock-tracker tsc -- --noEmit
          npm run --prefix lambdas/stock-level-resolver tsc -- --noEmit

      - name: Test
        run: |
          npm test --prefix lambdas/capacity-sync
          npm test --prefix lambdas/location-tracker
          npm test --prefix lambdas/stock-tracker
          npm test --prefix lambdas/stock-level-resolver