name: CD

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest

    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    permissions:
      id-token: write
      contents: read

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      STACK_NAME: postnl-dks-${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      S3_BUCKET: postnl-dks-${{ github.ref_name == 'main' && 'prod' || 'dev' }}-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test --workspaces --if-present

      - name: Upload AppSync resolvers to S3
        run: aws s3 sync appsync/ s3://${{ env.S3_BUCKET }}/appsync/

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --s3-bucket ${{ env.S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --region eu-west-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset