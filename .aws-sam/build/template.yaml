AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PostNL DKS Ketenplanning
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME:
          Ref: MainTable
Resources:
  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: postnl-dks-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: destination
        AttributeType: S
      - AttributeName: iotUpdatedAt
        AttributeType: S
      - AttributeName: date
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: destination-index
        KeySchema:
        - AttributeName: destination
          KeyType: HASH
        - AttributeName: iotUpdatedAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: date-index
        KeySchema:
        - AttributeName: date
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  IotLocationStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name:
        Fn::Sub: postnl-dks-${AWS::StackName}-iot-location
      StreamModeDetails:
        StreamMode: ON_DEMAND
  ScanningStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name:
        Fn::Sub: postnl-dks-${AWS::StackName}-scanning
      StreamModeDetails:
        StreamMode: ON_DEMAND
  CapacitySyncFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/handler.ts
        External:
        - '@aws-sdk/*'
        Minify: false
        Target: es2020
      SamResourceId: CapacitySyncFunction
    Properties:
      FunctionName:
        Fn::Sub: postnl-dks-${AWS::StackName}-capacity-sync
      Handler: handler.handler
      CodeUri: CapacitySyncFunction
      Description: Fetches capacity Excels from OneDrive and stores them in DynamoDB
      Environment:
        Variables:
          TENANT_ID:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/tenant-id}}'
          CLIENT_ID:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/client-id}}'
          CLIENT_SECRET:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/client-secret}}'
          DRIVE_ID:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/drive-id}}'
          DAILY_FILE_ID:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/daily-file-id}}'
          WEEKLY_FILE_ID:
            Fn::Sub: '{{resolve:ssm:/postnl/dks/weekly-file-id}}'
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MainTable
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 10 * * ? *)
            Input: '{"type": "daily"}'
        WeeklySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 14 ? * 5 *)
            Input: '{"type": "weekly"}'
  LocationTrackerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/handler.ts
        External:
        - '@aws-sdk/*'
        Minify: false
        Target: es2020
      SamResourceId: LocationTrackerFunction
    Properties:
      FunctionName:
        Fn::Sub: postnl-dks-${AWS::StackName}-location-tracker
      Handler: handler.handler
      CodeUri: LocationTrackerFunction
      Description: Processes IoT location events and updates container state
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MainTable
      Events:
        IotStream:
          Type: Kinesis
          Properties:
            Stream:
              Fn::GetAtt:
              - IotLocationStream
              - Arn
            StartingPosition: LATEST
            BatchSize: 100
            BisectBatchOnFunctionError: true
  StockTrackerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/handler.ts
        External:
        - '@aws-sdk/*'
        Minify: false
        Target: es2020
      SamResourceId: StockTrackerFunction
    Properties:
      FunctionName:
        Fn::Sub: postnl-dks-${AWS::StackName}-stock-tracker
      Handler: handler.handler
      CodeUri: StockTrackerFunction
      Description: Processes scanning events and updates container status and destination
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: MainTable
      Events:
        ScanStream:
          Type: Kinesis
          Properties:
            Stream:
              Fn::GetAtt:
              - ScanningStream
              - Arn
            StartingPosition: LATEST
            BatchSize: 100
            BisectBatchOnFunctionError: true
  StockLevelResolverFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - src/handler.ts
        External:
        - '@aws-sdk/*'
        Minify: false
        Target: es2020
      SamResourceId: StockLevelResolverFunction
    Properties:
      FunctionName:
        Fn::Sub: postnl-dks-${AWS::StackName}-stock-level-resolver
      Handler: handler.handler
      CodeUri: StockLevelResolverFunction
      Description: Aggregates container stock levels per depot for AppSync
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: MainTable
  StockLevelResolverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::GetAtt:
        - StockLevelResolverFunction
        - Arn
      Action: lambda:InvokeFunction
      Principal: appsync.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - GraphQLApi
        - Arn
  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name:
        Fn::Sub: postnl-dks-${AWS::StackName}
      AuthenticationType: AWS_IAM
      AdditionalAuthenticationProviders:
      - AuthenticationType: AMAZON_COGNITO_USER_POOLS
        UserPoolConfig:
          UserPoolId:
            Ref: FrontendUserPool
          AwsRegion:
            Ref: AWS::Region
  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      DefinitionS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/schema.graphql
  DynamoDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      Name: DynamoDataSource
      Type: AMAZON_DYNAMODB
      DynamoDBConfig:
        TableName:
          Ref: MainTable
        AwsRegion:
          Ref: AWS::Region
      ServiceRoleArn:
        Fn::GetAtt:
        - AppSyncDynamoRole
        - Arn
  StockLevelDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      Name: StockLevelDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn:
          Fn::GetAtt:
          - StockLevelResolverFunction
          - Arn
      ServiceRoleArn:
        Fn::GetAtt:
        - AppSyncLambdaRole
        - Arn
  GetCapacityResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getCapacity
      DataSourceName:
        Fn::GetAtt:
        - DynamoDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getCapacity.js
  GetAllCapacitiesResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getAllCapacities
      DataSourceName:
        Fn::GetAtt:
        - DynamoDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllCapacities.js
  GetStockLevelResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getStockLevel
      DataSourceName:
        Fn::GetAtt:
        - StockLevelDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getStockLevel.js
  GetAllStockLevelsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getAllStockLevels
      DataSourceName:
        Fn::GetAtt:
        - StockLevelDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllStockLevels.js
  GetForecastResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getForecast
      DataSourceName:
        Fn::GetAtt:
        - DynamoDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getForecast.js
  GetAllForecastsForDateResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Query
      FieldName: getAllForecastsForDate
      DataSourceName:
        Fn::GetAtt:
        - DynamoDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllForecastsForDate.js
  PublishForecastResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId:
        Fn::GetAtt:
        - GraphQLApi
        - ApiId
      TypeName: Mutation
      FieldName: publishForecast
      DataSourceName:
        Fn::GetAtt:
        - DynamoDataSource
        - Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location:
        Fn::Sub: s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Mutation.publishForecast.js
  FrontendUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: postnl-dks-${AWS::StackName}-operators
      AutoVerifiedAttributes:
      - email
  FrontendUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId:
        Ref: FrontendUserPool
      ClientName: postnl-dks-web-client
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
  AppSyncDynamoRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: appsync.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: DynamoAccess
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:BatchWriteItem
            Resource:
            - Fn::GetAtt:
              - MainTable
              - Arn
            - Fn::Sub: ${MainTable.Arn}/index/*
  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: appsync.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: LambdaInvoke
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource:
              Fn::GetAtt:
              - StockLevelResolverFunction
              - Arn
Outputs:
  GraphQLApiUrl:
    Value:
      Fn::GetAtt:
      - GraphQLApi
      - GraphQLUrl
  GraphQLApiId:
    Value:
      Fn::GetAtt:
      - GraphQLApi
      - ApiId
  MainTableName:
    Value:
      Ref: MainTable
  IotLocationStreamArn:
    Value:
      Fn::GetAtt:
      - IotLocationStream
      - Arn
  ScanningStreamArn:
    Value:
      Fn::GetAtt:
      - ScanningStream
      - Arn
  FrontendUserPoolId:
    Value:
      Ref: FrontendUserPool
  FrontendUserPoolClientId:
    Value:
      Ref: FrontendUserPoolClient
