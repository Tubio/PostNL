AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: PostNL DKS Ketenplanning

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref MainTable

Resources:

  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "postnl-dks-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: destination
          AttributeType: S
        - AttributeName: iotUpdatedAt
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: destination-index
          KeySchema:
            - AttributeName: destination
              KeyType: HASH
            - AttributeName: iotUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: date-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  IotLocationStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "postnl-dks-${AWS::StackName}-iot-location"
      StreamModeDetails:
        StreamMode: ON_DEMAND

  ScanningStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "postnl-dks-${AWS::StackName}-scanning"
      StreamModeDetails:
        StreamMode: ON_DEMAND

  CapacitySyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "postnl-dks-${AWS::StackName}-capacity-sync"
      Handler: dist/handler.handler
      CodeUri: lambdas/capacity-sync/
      Description: Fetches capacity Excels from OneDrive and stores them in DynamoDB
      Environment:
        Variables:
          TENANT_ID: !Sub "{{resolve:ssm:/postnl/dks/tenant-id}}"
          CLIENT_ID: !Sub "{{resolve:ssm:/postnl/dks/client-id}}"
          CLIENT_SECRET: !Sub "{{resolve:ssm:/postnl/dks/client-secret}}"
          DRIVE_ID: !Sub "{{resolve:ssm:/postnl/dks/drive-id}}"
          DAILY_FILE_ID: !Sub "{{resolve:ssm:/postnl/dks/daily-file-id}}"
          WEEKLY_FILE_ID: !Sub "{{resolve:ssm:/postnl/dks/weekly-file-id}}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 10 * * ? *)"
            Input: '{"type": "daily"}'
        WeeklySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 14 ? * 5 *)"
            Input: '{"type": "weekly"}'

  LocationTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "postnl-dks-${AWS::StackName}-location-tracker"
      Handler: dist/handler.handler
      CodeUri: lambdas/location-tracker/
      Description: Processes IoT location events and updates container state
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        IotStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt IotLocationStream.Arn
            StartingPosition: LATEST
            BatchSize: 100
            BisectBatchOnFunctionError: true

  StockTrackerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "postnl-dks-${AWS::StackName}-stock-tracker"
      Handler: dist/handler.handler
      CodeUri: lambdas/stock-tracker/
      Description: Processes scanning events and updates container status and destination
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        ScanStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt ScanningStream.Arn
            StartingPosition: LATEST
            BatchSize: 100
            BisectBatchOnFunctionError: true

  StockLevelResolverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "postnl-dks-${AWS::StackName}-stock-level-resolver"
      Handler: dist/handler.handler
      CodeUri: lambdas/stock-level-resolver/
      Description: Aggregates container stock levels per depot for AppSync
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MainTable

  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub "postnl-dks-${AWS::StackName}"
      AuthenticationType: AWS_IAM
      AdditionalAuthenticationProviders:
        - AuthenticationType: AMAZON_COGNITO_USER_POOLS
          UserPoolConfig:
            UserPoolId: !Ref FrontendUserPool
            AwsRegion: !Ref AWS::Region

  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      DefinitionS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/schema.graphql"

  DynamoDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: DynamoDataSource
      Type: AMAZON_DYNAMODB
      DynamoDBConfig:
        TableName: !Ref MainTable
        AwsRegion: !Ref AWS::Region
      ServiceRoleArn: !GetAtt AppSyncDynamoRole.Arn

  StockLevelDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: StockLevelDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !GetAtt StockLevelResolverFunction.Arn
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn

  GetCapacityResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getCapacity
      DataSourceName: !GetAtt DynamoDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getCapacity.js"

  GetAllCapacitiesResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getAllCapacities
      DataSourceName: !GetAtt DynamoDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllCapacities.js"

  GetStockLevelResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getStockLevel
      DataSourceName: !GetAtt StockLevelDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getStockLevel.js"

  GetAllStockLevelsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getAllStockLevels
      DataSourceName: !GetAtt StockLevelDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllStockLevels.js"

  GetForecastResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getForecast
      DataSourceName: !GetAtt DynamoDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getForecast.js"

  GetAllForecastsForDateResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getAllForecastsForDate
      DataSourceName: !GetAtt DynamoDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Query.getAllForecastsForDate.js"

  PublishForecastResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Mutation
      FieldName: publishForecast
      DataSourceName: !GetAtt DynamoDataSource.Name
      Kind: UNIT
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      CodeS3Location: !Sub "s3://postnl-dks-${AWS::StackName}-artifacts/appsync/resolvers/Mutation.publishForecast.js"

  FrontendUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "postnl-dks-${AWS::StackName}-operators"
      AutoVerifiedAttributes:
        - email

  FrontendUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref FrontendUserPool
      ClientName: postnl-dks-web-client
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  AppSyncDynamoRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt MainTable.Arn
                  - !Sub "${MainTable.Arn}/index/*"

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt StockLevelResolverFunction.Arn

Outputs:
  GraphQLApiUrl:
    Value: !GetAtt GraphQLApi.GraphQLUrl

  GraphQLApiId:
    Value: !GetAtt GraphQLApi.ApiId

  MainTableName:
    Value: !Ref MainTable

  IotLocationStreamArn:
    Value: !GetAtt IotLocationStream.Arn

  ScanningStreamArn:
    Value: !GetAtt ScanningStream.Arn

  FrontendUserPoolId:
    Value: !Ref FrontendUserPool

  FrontendUserPoolClientId:
    Value: !Ref FrontendUserPoolClient

  StockLevelResolverInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StockLevelResolverFunction.Arn
      Action: lambda:InvokeFunction
      Principal: appsync.amazonaws.com
      SourceArn: !GetAtt GraphQLApi.Arn